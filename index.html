<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors Game</h1>
    <button onclick="play('rock')" class="icon"><img src="images/rock-emoji.png" class="emoji" /></button>
    <button onclick="play('paper')" class="icon"><img src="images/paper-emoji.png" class="emoji"/></button>
    <button onclick="play('scissors')" class="icon"><img src="images/scissors-emoji.png" class="emoji"/></button>
    <p id="result"></p>
    <p id="move"></p>
    <p id="score"></p>
     <button onclick="reset()">Reset Score</button>

    <script src="logic.js"></script>
  </body>
</html>
